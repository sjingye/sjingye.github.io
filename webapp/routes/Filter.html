<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="./lib/flexible/build/flexible.js"></script>
    <script src="./lib/zepto/src/zepto.min.js"></script>
    <script src="./lib/zepto/src/event.js"></script>
    <script src="./lib/zepto/src/touch.js"></script>
    <link rel="stylesheet" href="./css/filter.css" />
    <title>filter</title>
</head>
<body>
 <!-- 头部-->
<div class = "top">
    <div class="top-label">
        <a class="prev">
            <img src="img/images/back.png">
        </a>
        <h2>选择日期</h2>
    </div>
</div>
<!-- end 头部-->
<!-- 主体部分 -->
<div class ="wrap">
    <ul class="week">
        <li class="weekend">日</li>
        <li>一</li>
        <li>二</li>
        <li>三</li>
        <li>四</li>
        <li>五</li>
        <li class="weekend">六</li>
    </ul>
    <div class="calendar">
        <div class="date-nearly">
            <h4>
                <strong>2017</strong>
                年
                <em>01</em>
                月
            </h4>
            <ul>
                <li>
                    <p class="past">22</p>
                </li>
                <li>
                    <p>23</p>
                </li>
                <li>
                    <p>24</p>
                </li>
                <li>
                    <p>25</p>
                </li>
                <li>
                    <p>26</p>
                </li>
                <li>
                    <p>1</p>
                </li>
                <li>
                    <p>5</p>
                </li>
            </ul>
        </div>
        <div class="date-next">
            <h4>
                <strong>2017</strong>
                年
                <em>01</em>
                月
            </h4>
            <ul>
                <li>
                    <p class="past">1</p>
                </li>
                <li>
                    <p>2</p>
                </li>
                <li>
                    <p>3</p>
                </li>
                <li>
                    <p>4</p>
                </li>
                <li>
                    <p class="active">1</p>
                </li>
                <li>
                    <p>1</p>
                </li>
                <li>
                    <p>5</p>
                </li>
            </ul>
        </div>
        <div class="date-next-more">
            <h4>
                <strong>2017</strong>
                年
                <em>01</em>
                月
            </h4>
            <ul>
                <li>
                    <p class="past">1</p>
                </li>
                <li>
                    <p>2</p>
                </li>
                <li>
                    <p>3</p>
                </li>
                <li>
                    <p>4</p>
                </li>
                <li>
                    <p class="active">1</p>
                </li>
                <li>
                    <p>1</p>
                </li>
                <li>
                    <p>5</p>
                </li>
            </ul>
        </div>
    </div>
   
    <p class="choose-date">
        <strong class="prev-month">10</strong>
        .
        <span class="prev-date">17</span>
        <em>-</em>
        <strong class="next-month">10</strong>
        .
        <span class="next-date">20</span>
    </p>
    <p class="total-days">
        <strong>4</strong>天(
        <span>3</span>夜)
    </p>
    <p class="apply">下单</p>
<script src="js/filter.js"></script>
</div>
</body>
</html>
