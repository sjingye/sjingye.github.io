<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="./dist/css/signin.css"/>

<body>
<!-- 主体部分 -->
<div class ="wrap">
	<img src="img/images/signin.png" class="signin">
	<h3>创建账户</h3>
    <p class="note">

    </p>
    <form action="#">
        <table>
            <tr>
                <td>
                    <input type="text" name="user-name" placeholder="用户名" id="t0">
                </td>
                
            </tr>
            <tr>
                <td id="h0"  class="remind"></td>
            </tr>
            <tr>
                <td>
                    <input type="text" name="email" placeholder="邮箱/手机号" id="t1">
                </td>
            </tr>
            <tr>
               <td id="h1"  class="remind"></td>
            </tr>
            <tr>
                <td>
                    <input type="text" name="email" placeholder="密码" id="t2">
                </td>
            </tr>
            <tr>
                <td id="h2"  class="remind"></td>
            </tr>
        </table>
    </form>
    <p class="finalMessage"></p>
    <p class="create-account">创建账户</p>
    <p class="note-more">
        已经有账户？
        <a>登录</a>
    </p>
</div>
