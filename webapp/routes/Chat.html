<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="./lib/flexible/build/flexible.js"></script>
    <script src="./lib/zepto/src/zepto.min.js"></script>

    <link rel="stylesheet" href="./css/chat.css" />
    <title>chat</title>
</head>
<body>
<!-- 头部-->
<div class = "top">
    <div class="top-label">
        <a class="prev" href="index.html">
            <img src="img/images/back.png">
        </a>
        <h2>客服</h2>
    </div>
</div>
<!-- end 头部-->

<!-- 主体部分 -->
<div class="content clearfix">
    <div class="wrap clearfix">
        <div class="service-talk clearfix">
            <div>
                <p class="goods-info">
                    拥有312个房间的香港丽思卡尔顿酒店，处于环球贸易广场的顶部的16层，酒店有1588英尺高，因而成为了世界最高酒店
                </p>
                <div class="small-pic">
                    <img src="img/Chat-01.png">
                    <img src="img/Chat-02.png">
                    <img src="img/Chat-03.png">
                </div>
                <p class="talk-time clearfix">
                    <strong>4-31</strong>
                    <em>14:20</em>
                </p>
            </div>
        </div>
        <div class="customer-talk clearfix">
            <div>
                <p>
                    请问最近推出的双人优惠套餐的具体情况？我想参加，但有一些问题想咨询。
                </p>
                <p class="talk-time clearfix">
                    <strong>5-01</strong>
                    <em>14:28</em>
                </p>
            </div>
        </div>
        <div class="service-talk clearfix">
            <div>
                <p class="goods-info">
                    最美优惠来了！好礼享不停！只要388元即可享受优惠海景房哦！
                </p>
                <p class="talk-time clearfix">
                    <strong>6-31</strong>
                    <em>14:35</em>
                </p>
            </div>
        </div>
    </div>
 </div>
<!-- end 主体部分 -->
 <div class="talk-box clearfix">
     <!--<a class="icon add-talk"></a>-->
     <input type="text" class="input-talk" placeholder="在此输入">
     <p class="send">发送</p>
 </div>
<script type="text/javascript" src="./js/chat.js"></script>
</body>
</html>
